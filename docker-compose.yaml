services:
  db:
    image: mysql:latest
    restart: always
    env_file:
      - .env
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  server:
    build: ./server
    restart: always
    ports:
      - "3001:3001"
    depends_on:
      - db
    env_file:
      - .env

volumes:
  db_data:
